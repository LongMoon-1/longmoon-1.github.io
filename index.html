<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>翻译工具</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background-color: #0f0f0f;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }

        .translate-container {
            width: 100%;
            max-width: 1400px;
            background-color: #121217;
            display: flex;
            flex-direction: column;
            border-radius: 28px;
            overflow: hidden;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.5);
            border: 1px solid #2a2a32;
        }

        @media (min-width: 761px) {
            .translate-container { height: 90vh; }
        }
        @media (max-width: 760px) {
            body { padding: 8px; align-items: flex-start; }
            .translate-container { margin: 8px 0; }
        }

        .tool-header {
            padding: 16px 24px;
            border-bottom: 1px solid #2a2a32;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: #0f0f14;
            flex-wrap: wrap;
            gap: 12px;
            flex-shrink: 0;
        }

        .header-left h1 {
            color: white;
            font-size: 1.5rem;
            font-weight: 500;
            letter-spacing: 0.5px;
        }
        .header-left h1 i { margin-right: 8px; color: #4a9eff; }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .copyright-right {
            display: flex;
            align-items: center;
            gap: 6px;
            background: rgba(43, 82, 120, 0.2);
            padding: 6px 16px;
            border-radius: 40px;
            border: 1px solid #2b5278;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .copyright-right:hover { background: rgba(43, 82, 120, 0.4); border-color: #4a9eff; }
        .copyright-right i { color: #7ab7ff; font-size: 0.8rem; }
        .copyright-right span { color: #c0d4ff; font-size: 0.85rem; font-weight: 500; }

        .about-btn {
            background: #1e3a5f;
            color: white;
            border: none;
            padding: 6px 16px;
            border-radius: 40px;
            font-size: 0.85rem;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .about-btn:hover { background: #2b5a8c; }

        .debug-btn {
            background-color: #4a4a5a;
            color: #aaa;
            border: none;
            padding: 6px 16px;
            border-radius: 40px;
            font-size: 0.85rem;
            cursor: default;
            transition: 0.2s;
            opacity: 0.7;
            pointer-events: none;
        }
        .debug-btn.active {
            background-color: #2b5278;
            color: white;
            opacity: 1;
            pointer-events: auto;
            cursor: pointer;
        }
        .debug-btn.active:hover { background-color: #366b9e; }

        .translation-workspace {
            flex: 1;
            padding: 24px;
            display: flex;
            gap: 24px;
            overflow: auto;
            min-height: 0;
        }

        .source-panel, .target-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            background-color: #18181f;
            border-radius: 24px;
            border: 1px solid #2a2a33;
            overflow: hidden;
            min-width: 0;
        }

        .panel-header {
            padding: 14px 20px;
            background-color: #20202a;
            border-bottom: 1px solid #2c2c36;
            flex-shrink: 0;
        }

        .lang-indicator {
            display: flex;
            align-items: center;
            gap: 10px;
            color: #aaa;
            font-size: 0.85rem;
        }
        .lang-indicator i { color: #888; }

        .target-lang-selector {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }
        .target-lang-selector i { color: #888; font-size: 0.9rem; }
        .target-lang-selector span { color: #aaa; font-size: 0.85rem; }
        .target-lang-selector select {
            background-color: #2c2c38;
            color: white;
            border: 1px solid #3e3e4a;
            padding: 6px 12px;
            border-radius: 24px;
            font-size: 0.85rem;
            cursor: pointer;
            outline: none;
        }

        .source-textarea {
            flex: 1;
            background-color: #13131a;
            padding: 18px;
            overflow: auto;
        }
        .source-textarea textarea {
            width: 100%;
            height: 100%;
            background: none;
            border: none;
            color: #eef2ff;
            font-size: 1rem;
            line-height: 1.55;
            resize: none;
            outline: none;
            font-family: inherit;
        }
        .source-textarea textarea::placeholder { color: #4a4a5a; }

        .target-result {
            flex: 1;
            background-color: #111117;
            padding: 18px;
            overflow-y: auto;
            color: #eef2ff;
            font-size: 1rem;
            line-height: 1.55;
            white-space: pre-wrap;
            word-break: break-word;
        }
        .placeholder-result {
            color: #5a5a72;
            font-style: italic;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* 淡入动画 */
        .fade-char {
            animation: fadeInChar 1.7s ease-out forwards;
        }
        @keyframes fadeInChar {
            0% { opacity: 0; }
            100% { opacity: 1; }
        }

        .translate-footer {
            padding: 16px 24px;
            border-top: 1px solid #2a2a32;
            background-color: #0f0f14;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
            flex-shrink: 0;
        }

        .mode-selector {
            display: flex;
            gap: 8px;
            background-color: #191921;
            padding: 4px;
            border-radius: 48px;
            border: 1px solid #2c2c34;
        }
        .mode-btn {
            background: transparent;
            border: none;
            padding: 8px 24px;
            border-radius: 40px;
            font-size: 0.9rem;
            font-weight: 500;
            color: #a0a5c0;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .mode-btn.active { background-color: #2b5278; color: white; }

        .translate-actions {
            display: flex;
            gap: 12px;
            align-items: center;
        }
        .primary-btn {
            background-color: #3e7bc9;
            border: none;
            padding: 9px 28px;
            border-radius: 40px;
            color: white;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .primary-btn:disabled {
            background-color: #3a3a48;
            cursor: not-allowed;
            opacity: 0.6;
        }

        .github-spinner {
            width: 16px;
            height: 16px;
            display: inline-block;
        }
        .github-spinner svg {
            width: 100%;
            height: 100%;
            display: block;
        }
        .spinner-group {
            animation: smart-rotate 2.4s linear infinite;
            transform-origin: center;
        }
        .spinner-circle {
            stroke: white;
            stroke-width: 3.5;
            fill: none;
            stroke-linecap: round;
            stroke-dasharray: 16.965, 113.1;
            stroke-dashoffset: 0;
            animation: arc-breathe 2.4s ease-in-out infinite;
        }
        @keyframes smart-rotate {
            0% { transform: rotate(0deg); }
            50% { transform: rotate(360deg); }
            100% { transform: rotate(1080deg); }
        }
        @keyframes arc-breathe {
            0%, 100% { stroke-dasharray: 16.965, 113.1; }
            50% { stroke-dasharray: 96.14, 113.1; }
        }

        .copy-transparent-btn {
            background: transparent;
            border: 1px solid #4a6a8a;
            color: #bbd4ff;
            padding: 8px 22px;
            border-radius: 40px;
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: 0.2s;
        }
        .copy-transparent-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            pointer-events: none;
        }
        .copy-transparent-btn:hover:not(:disabled) {
            background: rgba(74, 158, 255, 0.1);
            border-color: #7aadff;
            color: white;
        }
        .clear-btn {
            background: none;
            border: 1px solid #444;
            color: #aaa;
            padding: 8px 20px;
            border-radius: 40px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .clear-btn:hover { border-color: #666; color: #ddd; }

        /* 模态框通用样式 */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 11000;
        }
        .modal-content {
            background: #1e1e2e;
            border: 1px solid #4a9eff;
            border-radius: 20px;
            padding: 28px 32px;
            max-width: 360px;
            text-align: center;
            color: #eef2ff;
            font-size: 0.9rem;
            line-height: 1.6;
            box-shadow: 0 12px 32px rgba(0,0,0,0.6);
        }
        .modal-content h3 {
            margin-bottom: 16px;
            font-size: 1.2rem;
            color: #7ab7ff;
        }
        .modal-content p {
            margin-bottom: 12px;
            text-align: left;
        }
        .modal-content .divider {
            margin-top: 16px;
            padding-top: 12px;
            border-top: 1px solid #3a3a4a;
            font-size: 0.8rem;
            color: #8b9bb5;
        }
        .modal-content button {
            background: #2b5278;
            border: none;
            padding: 8px 28px;
            border-radius: 40px;
            color: white;
            cursor: pointer;
            margin-top: 20px;
            font-size: 0.85rem;
        }
        .modal-content button:hover { background: #366b9e; }

        .simple-password-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: transparent;
            display: none;
            z-index: 10000;
        }
        .simple-password-input {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #1e1e2e;
            border: 1px solid #4a9eff;
            border-radius: 12px;
            padding: 12px 16px;
            color: white;
            font-size: 1rem;
            width: 240px;
            outline: none;
            text-align: center;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            z-index: 10001;
        }

        .debug-fullscreen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #0a0c10;
            z-index: 5000;
            display: none;
            flex-direction: column;
            font-family: 'SF Mono', 'Fira Code', monospace;
        }
        .debug-header {
            padding: 16px 24px;
            background: #0f1117;
            border-bottom: 1px solid #2a2e3a;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
        }
        .debug-header h3 { color: #9cdcfe; font-size: 1rem; font-family: monospace; }
        .debug-close {
            background: #1e1f2c;
            border: none;
            color: #bbb;
            width: 32px;
            height: 32px;
            border-radius: 8px;
            cursor: pointer;
        }
        .debug-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #0b0d12;
            display: flex;
            flex-direction: column;
            gap: 18px;
        }
        .debug-message { display: flex; gap: 12px; max-width: 90%; }
        .debug-user { align-self: flex-end; flex-direction: row-reverse; }
        .debug-ai { align-self: flex-start; }
        .debug-bubble {
            padding: 8px 14px;
            border-radius: 12px;
            font-size: 0.85rem;
            line-height: 1.5;
            background: #14161e;
            border: 1px solid #2a2e3a;
            color: #e2e8ff;
            word-break: break-word;
        }
        .debug-user .debug-bubble { background: #1e3a5f; border-color: #2b5a8c; }
        .debug-time { font-size: 0.6rem; color: #6b7280; margin-top: 4px; margin-left: 12px; }
        .debug-ai .debug-time { margin-left: 12px; }
        .debug-input-area {
            padding: 16px;
            background: #0a0c10;
            border-top: 1px solid #1e2128;
            flex-shrink: 0;
        }
        .debug-input-row {
            display: flex;
            gap: 12px;
            background: #111318;
            border: 1px solid #2a2e3a;
            border-radius: 14px;
            padding: 8px 14px;
        }
        .command-btn {
            background: #1e3a5f;
            border: none;
            color: white;
            width: 32px;
            height: 32px;
            border-radius: 10px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .debug-input {
            flex: 1;
            background: none;
            border: none;
            color: #e2e8f0;
            font-family: monospace;
            font-size: 0.85rem;
            outline: none;
            resize: none;
        }
        .debug-send {
            background: #2d4f7c;
            border: none;
            color: white;
            width: 32px;
            height: 32px;
            border-radius: 10px;
            cursor: pointer;
        }
        .command-panel {
            position: fixed;
            bottom: 80px;
            left: 20px;
            background: #1e1f2c;
            border: 1px solid #4a9eff;
            border-radius: 12px;
            padding: 12px;
            display: none;
            flex-direction: column;
            gap: 8px;
            z-index: 6000;
            max-width: 260px;
        }
        .command-item {
            padding: 8px 12px;
            background: #2a2e3a;
            border-radius: 8px;
            color: #9cdcfe;
            font-size: 0.8rem;
            cursor: pointer;
            font-family: monospace;
        }
        .command-item:hover { background: #3a3e4a; }
        .command-category { color: #888; font-size: 0.7rem; padding-left: 4px; margin-top: 4px; }
        .custom-toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #1e2a3a;
            backdrop-filter: blur(8px);
            color: #eaf4ff;
            padding: 10px 24px;
            border-radius: 40px;
            font-size: 0.85rem;
            z-index: 6000;
            display: flex;
            align-items: center;
            gap: 8px;
            border: 1px solid #4a9eff;
            animation: fadeUp 2s forwards;
            pointer-events: none;
            white-space: nowrap;
        }
        @keyframes fadeUp {
            0% { opacity: 0; transform: translateX(-50%) translateY(10px); }
            15% { opacity: 1; transform: translateX(-50%) translateY(0); }
            85% { opacity: 1; transform: translateX(-50%) translateY(0); }
            100% { opacity: 0; visibility: hidden; }
        }
        @media (max-width: 760px) {
            .translation-workspace { flex-direction: column; gap: 16px; padding: 16px; overflow: visible; }
            .source-textarea, .target-result { min-height: 200px; }
            .tool-header { padding: 12px 16px; }
            .header-left h1 { font-size: 1.2rem; }
            .mode-btn { padding: 5px 16px; font-size: 0.8rem; }
            .primary-btn, .copy-transparent-btn, .clear-btn { padding: 6px 14px; font-size: 0.8rem; }
            .about-btn, .debug-btn { padding: 5px 12px; font-size: 0.75rem; }
            .custom-toast { white-space: normal; text-align: center; max-width: 85%; }
            .modal-content { padding: 20px 24px; max-width: 320px; }
        }
    </style>
</head>
<body>
<div class="translate-container">
    <div class="tool-header">
        <div class="header-left"><h1><i class="fas fa-language"></i> 翻译工具</h1></div>
        <div class="header-actions">
            <div class="copyright-right" id="copyrightBtn"><i class="fas fa-copyright"></i><span>@LongMoon</span></div>
            <button class="about-btn" id="aboutBtn"><i class="fas fa-info-circle"></i> 关于</button>
            <button class="debug-btn" id="debugBtn" disabled>调试</button>
        </div>
    </div>

    <div class="translation-workspace">
        <div class="source-panel">
            <div class="panel-header"><div class="lang-indicator"><i class="fas fa-globe"></i><span>源语言 (自动检测)</span></div></div>
            <div class="source-textarea"><textarea id="srcText" placeholder="输入要翻译的文字..."></textarea></div>
        </div>
        <div class="target-panel">
            <div class="panel-header">
                <div class="target-lang-selector"><i class="fas fa-bullseye"></i><span>目标语言</span>
                    <select id="tgtLangSelect">
                        <option value="英文" selected>英文</option><option value="中文">中文</option><option value="日文">日文</option><option value="韩文">韩文</option>
                        <option value="法文">法文</option><option value="德文">德文</option><option value="俄文">俄文</option><option value="西班牙文">西班牙文</option>
                        <option value="阿拉伯文">阿拉伯文</option><option value="葡萄牙文">葡萄牙文</option><option value="意大利文">意大利文</option><option value="荷兰文">荷兰文</option>
                        <option value="瑞典文">瑞典文</option><option value="波兰文">波兰文</option><option value="土耳其文">土耳其文</option><option value="泰文">泰文</option>
                        <option value="越南文">越南文</option><option value="印地文">印地文</option><option value="希腊文">希腊文</option><option value="希伯来文">希伯来文</option>
                    </select>
                </div>
            </div>
            <div class="target-result" id="targetResult"><span class="placeholder-result"><i class="fas fa-arrow-right"></i> 翻译结果将显示在这里</span></div>
        </div>
    </div>

    <div class="translate-footer">
        <div class="mode-selector" id="modeGroup">
            <button id="modeFast" class="mode-btn active"><i class="fas fa-bolt"></i> 快速翻译</button>
            <button id="modeDetail" class="mode-btn"><i class="fas fa-book-open"></i> 详细释义</button>
        </div>
        <div class="translate-actions">
            <button class="clear-btn" id="clearBtn"><i class="fas fa-eraser"></i> 清空</button>
            <button class="copy-transparent-btn" id="copyResultBtn"><i class="fas fa-copy" id="copyIcon"></i> 复制结果</button>
            <button class="primary-btn" id="translateBtn">
                <i class="fas fa-globe"></i> 翻译
                <span id="translateSpinner" class="github-spinner" style="display: none;">
                    <svg viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
                        <g class="spinner-group">
                            <circle class="spinner-circle" cx="24" cy="24" r="18" />
                        </g>
                    </svg>
                </span>
            </button>
        </div>
    </div>
</div>

<!-- 关于模态框 -->
<div id="aboutModal" class="modal-overlay">
    <div class="modal-content">
        <h3>📄 关于</h3>
        <p>本翻译工具由 LongMoon 独立开发，基于智谱 AI 大模型提供翻译能力。</p>
        <p>翻译结果由人工智能自动生成，不保证 100% 准确，请结合上下文谨慎使用。对于关键内容，建议人工复核。</p>
        <p>未经授权，禁止将本工具的全部或部分代码用于商业用途、二次分发或盗用。</p>
        <div class="divider">© 2025 LongMoon</div>
        <button id="closeAboutBtn">关闭</button>
    </div>
</div>

<!-- 版权模态框（简短） -->
<div id="copyrightModal" class="modal-overlay">
    <div class="modal-content">
        <h3>© LongMoon</h3>
        <p>未经授权禁止转载或盗用代码<br>个人使用不受限制</p>
        <button id="closeCopyrightBtn">关闭</button>
    </div>
</div>

<div id="simplePasswordOverlay" class="simple-password-overlay">
    <input type="password" id="simplePasswordInput" class="simple-password-input" placeholder="" autocomplete="off">
</div>

<div id="debugFullscreen" class="debug-fullscreen">
    <div class="debug-header"><h3><i class="fas fa-terminal"></i> DEBUG CONSOLE</h3><button class="debug-close" id="debugCloseBtn">✕</button></div>
    <div id="debugMessages" class="debug-messages"></div>
    <div class="debug-input-area">
        <div class="debug-input-row">
            <button id="commandListBtn" class="command-btn"><i class="fas fa-list"></i></button>
            <textarea id="debugInput" class="debug-input" placeholder="$ 输入 / 查看指令..." rows="1"></textarea>
            <button id="debugSendBtn" class="debug-send"><i class="fas fa-arrow-up"></i></button>
        </div>
    </div>
</div>
<div id="commandPanel" class="command-panel">
    <div class="command-category">━━━ 状态管理 ━━━</div>
    <div class="command-item" data-cmd="/export">/export - 导出会话日志</div>
    <div class="command-item" data-cmd="/help">/help - 显示此面板</div>
</div>

<script>
    (function() {
        const ZHIPU_API_URL = 'https://open.bigmodel.cn/api/paas/v4/chat/completions';
        const FIXED_API_KEY = '20252a487bf4433dae034e4607626ff6.IZtAmpkRKydep2YR';

        let isTranslating = false, abortController = null, currentMode = 'fast', debugEnabled = false;
        let clickCount = 0, clickTimer = null, firstVerificationActive = false;

        const srcText = document.getElementById('srcText');
        const tgtLangSelect = document.getElementById('tgtLangSelect');
        const targetResult = document.getElementById('targetResult');
        const translateBtn = document.getElementById('translateBtn');
        const clearBtn = document.getElementById('clearBtn');
        const copyBtn = document.getElementById('copyResultBtn');
        const copyIcon = document.getElementById('copyIcon');
        const modeFast = document.getElementById('modeFast');
        const modeDetail = document.getElementById('modeDetail');
        const translateSpinner = document.getElementById('translateSpinner');
        const debugBtn = document.getElementById('debugBtn');
        const copyrightBtn = document.getElementById('copyrightBtn');
        const aboutBtn = document.getElementById('aboutBtn');
        const aboutModal = document.getElementById('aboutModal');
        const closeAboutBtn = document.getElementById('closeAboutBtn');
        const copyrightModal = document.getElementById('copyrightModal');
        const closeCopyrightBtn = document.getElementById('closeCopyrightBtn');
        const debugFullscreen = document.getElementById('debugFullscreen');
        const debugCloseBtn = document.getElementById('debugCloseBtn');
        const debugMessagesDiv = document.getElementById('debugMessages');
        const debugInput = document.getElementById('debugInput');
        const debugSendBtn = document.getElementById('debugSendBtn');
        const commandListBtn = document.getElementById('commandListBtn');
        const commandPanel = document.getElementById('commandPanel');
        const passwordOverlay = document.getElementById('simplePasswordOverlay');
        const passwordInput = document.getElementById('simplePasswordInput');

        function showToast(msg, isError = false) {
            const old = document.querySelector('.custom-toast');
            if (old) old.remove();
            const toast = document.createElement('div');
            toast.className = 'custom-toast';
            toast.innerHTML = `<i class="fas ${isError ? 'fa-exclamation-triangle' : 'fa-check-circle'}"></i> ${msg}`;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 2000);
        }

        // 模态框控制
        function showAboutModal() { aboutModal.style.display = 'flex'; }
        function closeAboutModal() { aboutModal.style.display = 'none'; }
        function showCopyrightModal() { copyrightModal.style.display = 'flex'; }
        function closeCopyrightModal() { copyrightModal.style.display = 'none'; }
        aboutBtn.addEventListener('click', showAboutModal);
        closeAboutBtn.addEventListener('click', closeAboutModal);
        aboutModal.addEventListener('click', (e) => { if(e.target === aboutModal) closeAboutModal(); });
        copyrightBtn.addEventListener('click', showCopyrightModal);
        closeCopyrightBtn.addEventListener('click', closeCopyrightModal);
        copyrightModal.addEventListener('click', (e) => { if(e.target === copyrightModal) closeCopyrightModal(); });

        async function handleCopy() {
            if (isTranslating) { showToast('翻译中，请稍后复制', true); return; }
            let text = '';
            if (targetResult.querySelector('.placeholder-result') && (!targetResult.innerText || targetResult.innerText.includes('翻译结果将显示在这里'))) {
                showToast('没有可复制的内容', true); return;
            }
            text = targetResult.innerText.trim();
            if (!text || text === '翻译结果将显示在这里') { showToast('暂无翻译结果', true); return; }
            try {
                await navigator.clipboard.writeText(text);
                const oldClass = copyIcon.className;
                copyIcon.className = 'fas fa-check';
                showToast('复制成功');
                setTimeout(() => { copyIcon.className = oldClass; }, 1500);
            } catch (e) {
                const textarea = document.createElement('textarea');
                textarea.value = text;
                textarea.style.position = 'fixed';
                textarea.style.top = '-9999px';
                document.body.appendChild(textarea);
                textarea.select();
                try {
                    document.execCommand('copy');
                    const oldClass = copyIcon.className;
                    copyIcon.className = 'fas fa-check';
                    showToast('复制成功');
                    setTimeout(() => { copyIcon.className = oldClass; }, 1500);
                } catch (err) { showToast('复制失败，请手动复制', true); }
                document.body.removeChild(textarea);
            }
        }

        function buildPrompt(tgtLang, text, mode) {
            if (mode === 'fast') {
                return `请把以下内容翻译成${tgtLang}，只输出翻译结果，不要添加任何解释。\n\n原文：${text}`;
            } else {
                return `你是一个专业的翻译和语言教师。请严格按以下步骤输出：

1. 将原文翻译成${tgtLang}，译文单独成行。
2. 用【原文的语言】写出“重点词汇解析”。针对原文中至少2个重要的实词（名词/动词/形容词），分别解释它的含义、语气或语境。
3. 用【原文的语言】写出“语法或句型说明”。分析原文中一个值得注意的语法点或固定句式。

要求：
- 必须使用原文的语言写解析和说明，严禁混入其他语言。
- 不要只写一句话，每部分至少两到三行。
- 各步骤之间用空行隔开。

原文：${text}`;
            }
        }

        async function callZhipuStream(prompt, onDelta, onEnd, signal) {
            const resp = await fetch(ZHIPU_API_URL, {
                method:'POST', headers:{'Content-Type':'application/json','Authorization':`Bearer ${FIXED_API_KEY}`},
                body: JSON.stringify({ model:'glm-4-flash', messages:[{role:'user', content:prompt}], stream:true }),
                signal
            });
            if(!resp.ok) { let err=`API ${resp.status}`; try{ const e=await resp.json(); err=e.error?.message||err; }catch(e){} throw new Error(err); }
            const reader = resp.body.getReader();
            const decoder = new TextDecoder();
            let buffer = '';
            while(true){
                const {done,value}=await reader.read();
                if(done) break;
                buffer += decoder.decode(value,{stream:true});
                const lines=buffer.split('\n');
                buffer=lines.pop()||'';
                for(const line of lines){
                    const l=line.trim();
                    if(!l || l==='data: [DONE]') continue;
                    if(l.startsWith('data: ')){
                        try{ const json=JSON.parse(l.slice(5)); const delta=json.choices?.[0]?.delta?.content; if(delta) onDelta(delta); }catch(e){}
                    }
                }
            }
            if(buffer){
                const lines=buffer.split('\n');
                for(const line of lines){
                    const l=line.trim();
                    if(!l || l==='data: [DONE]') continue;
                    if(l.startsWith('data: ')){
                        try{ const json=JSON.parse(l.slice(5)); const delta=json.choices?.[0]?.delta?.content; if(delta) onDelta(delta); }catch(e){}
                    }
                }
            }
            if(onEnd) onEnd();
        }

        // 淡入输出（每个字符块整体淡入，无光标）
        function appendFadeContent(htmlContent) {
            const wrapper = document.createElement('span');
            wrapper.className = 'fade-char';
            wrapper.innerHTML = htmlContent;
            targetResult.appendChild(wrapper);
            targetResult.scrollTop = targetResult.scrollHeight;
        }

        async function performTranslation() {
            const src = srcText.value.trim();
            if(!src) { showToast('请输入要翻译的文字', true); return; }
            const tgtLang = tgtLangSelect.value;
            if(isTranslating && abortController) abortController.abort();
            const prompt = buildPrompt(tgtLang, src, currentMode);
            if(debugEnabled) debugAppendUser(`[翻译] → ${tgtLang} (${currentMode==='fast'?'快速':'详细'})`);
            isTranslating=true;
            translateBtn.disabled=true;
            copyBtn.disabled=true;
            translateSpinner.style.display = 'inline-block';
            targetResult.innerHTML = '';
            abortController=new AbortController();
            try{
                await callZhipuStream(prompt, 
                    (delta) => {
                        appendFadeContent(delta.replace(/\n/g, '<br>'));
                        if(debugEnabled && debugStreamingContent) debugUpdateStreaming(delta);
                        else if(debugEnabled && !debugStreamingDiv) { debugCreateStreaming(); debugUpdateStreaming(delta); }
                    },
                    null,
                    abortController.signal
                );
                if(debugEnabled) debugFinalizeStreaming();
            }catch(err){
                if(err.name==='AbortError') targetResult.innerHTML='<span style="color:#ffaa66;"><i class="fas fa-ban"></i> 已取消</span>';
                else targetResult.innerHTML=`<span style="color:#f77;"><i class="fas fa-exclamation-triangle"></i> 失败: ${err.message}</span>`;
                if(debugEnabled && debugStreamingContent) debugUpdateStreaming(`\n[错误] ${err.message}`);
                if(debugEnabled) debugFinalizeStreaming();
            }finally{
                isTranslating=false; translateBtn.disabled=false; copyBtn.disabled=false; translateSpinner.style.display = 'none'; abortController=null;
            }
        }

        // 调试界面函数（控制台等待动画保持单点）
        function debugGetTime() { const d=new Date(); return `${d.getHours().toString().padStart(2,'0')}:${d.getMinutes().toString().padStart(2,'0')}:${d.getSeconds().toString().padStart(2,'0')}`; }
        function debugAppendUser(msg) {
            const div = document.createElement('div');
            div.className = 'debug-message debug-user';
            div.innerHTML = `<div class="debug-bubble">${escapeHtml(msg)}</div><div class="debug-time">${debugGetTime()}</div>`;
            debugMessagesDiv.appendChild(div);
            debugMessagesDiv.scrollTop = debugMessagesDiv.scrollHeight;
        }
        let debugStreamingDiv = null, debugStreamingContent = null, debugCursor = null;
        function debugShowThinkingCursor() {
            if (debugCursor) return;
            debugCursor = document.createElement('div');
            debugCursor.className = 'debug-message debug-ai';
            debugCursor.innerHTML = `<div class="debug-bubble"><span class="cursor-loader"></span></div><div class="debug-time">${debugGetTime()}</div>`;
            debugMessagesDiv.appendChild(debugCursor);
            debugMessagesDiv.scrollTop = debugMessagesDiv.scrollHeight;
        }
        function debugHideThinkingCursor() {
            if (debugCursor) { debugCursor.remove(); debugCursor = null; }
        }
        function debugCreateStreaming() {
            debugHideThinkingCursor();
            if (debugStreamingDiv && debugStreamingDiv.isConnected) return;
            debugStreamingDiv = document.createElement('div');
            debugStreamingDiv.className = 'debug-message debug-ai';
            debugStreamingDiv.innerHTML = `<div class="debug-bubble"></div><div class="debug-time">${debugGetTime()}</div>`;
            debugStreamingContent = debugStreamingDiv.querySelector('.debug-bubble');
            debugMessagesDiv.appendChild(debugStreamingDiv);
            debugMessagesDiv.scrollTop = debugMessagesDiv.scrollHeight;
        }
        function debugUpdateStreaming(text) {
            if (!debugStreamingContent) return;
            if (debugStreamingContent.innerHTML.endsWith('<span class="cursor-loader"></span>')) {
                debugStreamingContent.innerHTML = debugStreamingContent.innerHTML.replace('<span class="cursor-loader"></span>', '') + escapeHtml(text) + '<span class="cursor-loader"></span>';
            } else {
                debugStreamingContent.innerHTML += escapeHtml(text) + '<span class="cursor-loader"></span>';
            }
            debugMessagesDiv.scrollTop = debugMessagesDiv.scrollHeight;
        }
        function debugFinalizeStreaming() {
            if (debugStreamingContent) {
                debugStreamingContent.innerHTML = debugStreamingContent.innerHTML.replace('<span class="cursor-loader"></span>', '');
            }
            debugStreamingDiv = null;
            debugStreamingContent = null;
        }
        async function debugSendMessage() {
            const msg = debugInput.value.trim();
            if(!msg || !debugEnabled) return;
            if (msg.startsWith('/')) {
                if (msg === '/export') {
                    const logs = debugMessagesDiv.innerText;
                    console.log('[DEBUG_EXPORT]', logs);
                    showToast('日志已导出到控制台', false);
                    debugAppendUser('[系统] 会话日志已导出');
                } else if (msg === '/help') {
                    commandPanel.style.display = commandPanel.style.display === 'flex' ? 'none' : 'flex';
                }
                debugInput.value = '';
                return;
            }
            debugAppendUser(msg);
            debugInput.value = '';
            debugInput.style.height='auto';
            debugShowThinkingCursor();
            try{
                let started=false;
                await callZhipuStream(msg, 
                    (delta) => {
                        if(!started){ started=true; debugCreateStreaming(); }
                        debugUpdateStreaming(delta);
                    },
                    () => { debugFinalizeStreaming(); },
                    null
                );
            }catch(err){
                debugHideThinkingCursor();
                if(debugStreamingContent) debugUpdateStreaming(`\n[error] ${err.message}`);
                else debugAppendUser(`错误: ${err.message}`);
                debugFinalizeStreaming();
            }
        }

        debugBtn.addEventListener('click', () => {
            if(!debugEnabled) return;
            debugFullscreen.style.display = 'flex';
            commandPanel.style.display = 'none';
            if(debugMessagesDiv.children.length === 0) {
                const welcome = document.createElement('div');
                welcome.className = 'debug-message debug-ai';
                welcome.innerHTML = `<div class="debug-bubble">调试控制台已就绪 | 输入 /help 查看指令</div><div class="debug-time">${debugGetTime()}</div>`;
                debugMessagesDiv.appendChild(welcome);
            }
        });

        function startFirstVerification() {
            if (firstVerificationActive) return;
            firstVerificationActive = true;
            const hiddenInput = document.createElement('input');
            hiddenInput.type = 'text';
            hiddenInput.inputMode = 'numeric';
            hiddenInput.style.position = 'fixed';
            hiddenInput.style.top = '-100px';
            hiddenInput.style.left = '-100px';
            hiddenInput.style.opacity = '0';
            hiddenInput.style.pointerEvents = 'none';
            document.body.appendChild(hiddenInput);
            hiddenInput.focus();
            let buffer = '';
            const onInput = (e) => {
                const data = e.data;
                if (data) {
                    buffer += data;
                    if (buffer === '54188') {
                        cleanup();
                        showSecondPasswordModal();
                    } else if (!'54188'.startsWith(buffer)) {
                        buffer = '';
                    }
                }
            };
            const onBlur = () => { cleanup(); };
            const cleanup = () => {
                hiddenInput.removeEventListener('input', onInput);
                hiddenInput.removeEventListener('blur', onBlur);
                hiddenInput.blur();
                document.body.removeChild(hiddenInput);
                firstVerificationActive = false;
                resetClickCount();
            };
            hiddenInput.addEventListener('input', onInput);
            hiddenInput.addEventListener('blur', onBlur);
        }

        function showSecondPasswordModal() {
            passwordOverlay.style.display = 'block';
            passwordInput.value = '';
            passwordInput.focus();
            const checkAndClose = () => {
                if (passwordInput.value === '114514') {
                    debugEnabled = true;
                    debugBtn.disabled = false;
                    debugBtn.classList.add('active');
                    showToast("调试已解锁", false);
                    closeModal();
                }
            };
            const inputHandler = () => { checkAndClose(); };
            passwordInput.addEventListener('input', inputHandler);
            const outsideClickHandler = (e) => {
                if (!passwordInput.contains(e.target)) {
                    closeModal();
                }
            };
            const escHandler = (e) => { if (e.key === 'Escape') closeModal(); };
            function closeModal() {
                passwordOverlay.style.display = 'none';
                passwordInput.removeEventListener('input', inputHandler);
                document.removeEventListener('click', outsideClickHandler);
                document.removeEventListener('keydown', escHandler);
                resetClickCount();
            }
            document.addEventListener('click', outsideClickHandler);
            document.addEventListener('keydown', escHandler);
        }

        function resetClickCount() { clickCount = 0; if (clickTimer) clearTimeout(clickTimer); clickTimer = null; }

        clearBtn.addEventListener('click', () => {
            srcText.value = '';
            targetResult.innerHTML = '<span class="placeholder-result"><i class="fas fa-arrow-right"></i> 翻译结果将显示在这里</span>';
            if (debugEnabled) return;
            clickCount++;
            if (clickTimer) clearTimeout(clickTimer);
            clickTimer = setTimeout(() => { resetClickCount(); }, 800);
            if (clickCount >= 5) { resetClickCount(); startFirstVerification(); }
        });

        debugCloseBtn.addEventListener('click', () => { debugFullscreen.style.display = 'none'; debugFinalizeStreaming(); debugHideThinkingCursor(); commandPanel.style.display = 'none'; });
        debugFullscreen.addEventListener('click', (e) => { if(e.target === debugFullscreen) { debugFullscreen.style.display = 'none'; commandPanel.style.display = 'none'; } });
        debugSendBtn.addEventListener('click', debugSendMessage);
        commandListBtn.addEventListener('click', () => { commandPanel.style.display = commandPanel.style.display === 'flex' ? 'none' : 'flex'; });
        document.querySelectorAll('.command-item').forEach(item => {
            item.addEventListener('click', () => {
                const cmd = item.getAttribute('data-cmd');
                debugInput.value = cmd;
                commandPanel.style.display = 'none';
                debugSendMessage();
            });
        });
        debugInput.addEventListener('keydown', (e) => { if(e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); debugSendMessage(); } });
        debugInput.addEventListener('input', function() { this.style.height='auto'; this.style.height=Math.min(this.scrollHeight,80)+'px'; });

        modeFast.addEventListener('click',()=>{ modeFast.classList.add('active'); modeDetail.classList.remove('active'); currentMode='fast'; });
        modeDetail.addEventListener('click',()=>{ modeDetail.classList.add('active'); modeFast.classList.remove('active'); currentMode='detail'; });
        translateBtn.addEventListener('click', performTranslation);
        srcText.addEventListener('keydown', (e)=>{ if((e.ctrlKey||e.metaKey) && e.key==='Enter'){ e.preventDefault(); performTranslation(); } });
        copyBtn.addEventListener('click', handleCopy);
        function escapeHtml(str){ return str.replace(/[&<>]/g, function(m){ if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }
    })();
</script>
</body>
