<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>翻译工具 · LongMoon</title>
    <!-- Font Awesome 6 免费图标库 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
        }

        body {
            background-color: #0f0f0f;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }

        /* 主容器 */
        .translate-container {
            width: 100%;
            max-width: 1400px;
            height: 100%;
            background-color: #121217;
            display: flex;
            flex-direction: column;
            border-radius: 28px;
            overflow: hidden;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.5);
            border: 1px solid #2a2a32;
        }

        /* 头部 */
        .tool-header {
            padding: 16px 24px;
            border-bottom: 1px solid #2a2a32;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: #0f0f14;
            flex-wrap: wrap;
            gap: 12px;
        }

        /* 标题 + 可点击解锁调试 (无任何提示) */
        .clickable-title {
            cursor: pointer;
            user-select: none;
            transition: opacity 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .clickable-title:hover {
            opacity: 0.8;
        }
        .header-left h1 {
            color: white;
            font-size: 1.5rem;
            font-weight: 500;
            letter-spacing: 0.5px;
        }
        .header-left h1 i {
            margin-right: 8px;
            color: #4a9eff;
        }

        /* 右上角版权 @LongMoon */
        .copyright-right {
            display: flex;
            align-items: center;
            gap: 6px;
            background: rgba(43, 82, 120, 0.2);
            padding: 6px 16px;
            border-radius: 40px;
            border: 1px solid #2b5278;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .copyright-right:hover {
            background: rgba(43, 82, 120, 0.4);
            border-color: #4a9eff;
        }
        .copyright-right i {
            color: #7ab7ff;
            font-size: 0.8rem;
        }
        .copyright-right span {
            color: #c0d4ff;
            font-size: 0.85rem;
            font-weight: 500;
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        /* 调试按钮 - 默认置灰 */
        .debug-btn {
            background-color: #2b5278;
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 40px;
            font-size: 0.9rem;
            cursor: pointer;
            transition: 0.2s;
            opacity: 0.5;
            pointer-events: none;
        }
        .debug-btn.active {
            opacity: 1;
            pointer-events: auto;
        }
        .debug-btn.active:hover {
            background-color: #366b9e;
        }

        /* 双栏工作区 */
        .translation-workspace {
            flex: 1;
            padding: 24px;
            display: flex;
            gap: 24px;
            overflow: hidden;
            min-height: 0;
        }

        .source-panel,
        .target-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            background-color: #18181f;
            border-radius: 24px;
            border: 1px solid #2a2a33;
            overflow: hidden;
        }

        .panel-header {
            padding: 14px 20px;
            background-color: #20202a;
            border-bottom: 1px solid #2c2c36;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .lang-selector {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }
        .lang-selector i { color: #888; font-size: 0.9rem; }
        .lang-selector span { color: #aaa; font-size: 0.85rem; }
        .lang-selector select {
            background-color: #2c2c38;
            color: white;
            border: 1px solid #3e3e4a;
            padding: 6px 12px;
            border-radius: 24px;
            font-size: 0.85rem;
            cursor: pointer;
            outline: none;
        }
        .lang-selector select:hover { border-color: #6c8fb0; }

        .source-textarea {
            flex: 1;
            background-color: #13131a;
            padding: 18px;
        }
        .source-textarea textarea {
            width: 100%;
            height: 100%;
            background: none;
            border: none;
            color: #eef2ff;
            font-size: 1rem;
            line-height: 1.55;
            resize: none;
            outline: none;
            font-family: inherit;
        }
        .source-textarea textarea::placeholder { color: #4a4a5a; }

        .target-result {
            flex: 1;
            background-color: #111117;
            padding: 18px;
            overflow-y: auto;
            color: #eef2ff;
            font-size: 1rem;
            line-height: 1.55;
            white-space: pre-wrap;
            word-break: break-word;
        }
        .placeholder-result {
            color: #5a5a72;
            font-style: italic;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* 底部 */
        .translate-footer {
            padding: 16px 24px;
            border-top: 1px solid #2a2a32;
            background-color: #0f0f14;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
        }
        .mode-selector {
            display: flex;
            gap: 8px;
            background-color: #191921;
            padding: 4px;
            border-radius: 48px;
            border: 1px solid #2c2c34;
        }
        .mode-btn {
            background: transparent;
            border: none;
            padding: 8px 24px;
            border-radius: 40px;
            font-size: 0.9rem;
            font-weight: 500;
            color: #a0a5c0;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .mode-btn.active {
            background-color: #2b5278;
            color: white;
        }
        .translate-actions {
            display: flex;
            gap: 12px;
            align-items: center;
        }
        .primary-btn {
            background-color: #3e7bc9;
            border: none;
            padding: 9px 28px;
            border-radius: 40px;
            color: white;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .primary-btn:disabled {
            background-color: #3a3a48;
            cursor: not-allowed;
            opacity: 0.6;
        }
        .copy-transparent-btn {
            background: transparent;
            border: 1px solid #4a6a8a;
            color: #bbd4ff;
            padding: 8px 20px;
            border-radius: 40px;
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: 0.2s;
        }
        .copy-transparent-btn:hover {
            background: rgba(74, 158, 255, 0.1);
            border-color: #7aadff;
            color: white;
        }
        .clear-btn {
            background: none;
            border: 1px solid #444;
            color: #aaa;
            padding: 8px 20px;
            border-radius: 40px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .translate-spinner {
            display: none;
            width: 16px;
            height: 16px;
            border: 2px solid #fff;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-left: 4px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ========= 全屏调试界面 - 无AI头像，思考动画为单点 ========= */
        .debug-fullscreen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #0a0c10;
            z-index: 5000;
            display: none;
            flex-direction: column;
            font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
        }
        .debug-header {
            padding: 16px 24px;
            background: #0f1117;
            border-bottom: 1px solid #2a2e3a;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .debug-header h3 {
            color: #9cdcfe;
            font-size: 1rem;
            font-weight: 500;
            letter-spacing: 0.5px;
            font-family: monospace;
        }
        .debug-header h3 i {
            margin-right: 8px;
            color: #569cd6;
        }
        .debug-close {
            background: #1e1f2c;
            border: none;
            color: #bbb;
            font-size: 1.2rem;
            width: 32px;
            height: 32px;
            border-radius: 8px;
            cursor: pointer;
            font-family: monospace;
        }
        .debug-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #0b0d12;
            display: flex;
            flex-direction: column;
            gap: 18px;
            font-family: monospace;
        }
        .debug-message {
            display: flex;
            gap: 12px;
            max-width: 90%;
            font-family: monospace;
        }
        .debug-user {
            align-self: flex-end;
            flex-direction: row-reverse;
        }
        .debug-ai {
            align-self: flex-start;
        }
        /* 调试界面AI头像已完全删除，只保留消息气泡 */
        .debug-avatar {
            display: none;
        }
        /* 用户消息保留一个小图标以示区分（可选，但不是AI头像） */
        .debug-user .debug-avatar {
            display: flex;
            width: 28px;
            height: 28px;
            background: #1e3a5f;
            border-radius: 6px;
            align-items: center;
            justify-content: center;
            font-size: 0.7rem;
        }
        .debug-user .debug-avatar i {
            color: white;
        }
        .debug-bubble {
            padding: 8px 14px;
            border-radius: 12px;
            font-size: 0.85rem;
            line-height: 1.5;
            white-space: pre-wrap;
            word-break: break-word;
            font-family: monospace;
            background: #14161e;
            border: 1px solid #2a2e3a;
            color: #e2e8ff;
        }
        .debug-user .debug-bubble {
            background: #1e3a5f;
            border-color: #2b5a8c;
            color: white;
        }
        .debug-time {
            font-size: 0.6rem;
            color: #6b7280;
            margin-top: 4px;
            font-family: monospace;
        }
        /* 思考动画：改为一个点 (pulse) */
        .debug-thinking {
            padding: 8px 14px;
            background: #14161e;
            border-radius: 12px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border: 1px solid #2a2e3a;
            min-width: 40px;
        }
        .debug-dot-single {
            width: 8px;
            height: 8px;
            background: #7e8aa2;
            border-radius: 50%;
            animation: pulseSingle 1s infinite;
        }
        @keyframes pulseSingle {
            0%, 100% { opacity: 0.3; transform: scale(0.8); }
            50% { opacity: 1; transform: scale(1.2); }
        }
        .debug-input-area {
            padding: 16px;
            background: #0a0c10;
            border-top: 1px solid #1e2128;
        }
        .debug-input-row {
            display: flex;
            gap: 12px;
            background: #111318;
            border: 1px solid #2a2e3a;
            border-radius: 14px;
            padding: 8px 14px;
        }
        .debug-input {
            flex: 1;
            background: none;
            border: none;
            color: #e2e8f0;
            font-family: monospace;
            font-size: 0.85rem;
            outline: none;
            resize: none;
        }
        .debug-send {
            background: #2d4f7c;
            border: none;
            color: white;
            width: 32px;
            height: 32px;
            border-radius: 10px;
            cursor: pointer;
        }
        .custom-toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #1e2a3a;
            backdrop-filter: blur(8px);
            color: #eaf4ff;
            padding: 8px 20px;
            border-radius: 40px;
            font-size: 0.85rem;
            z-index: 6000;
            display: flex;
            align-items: center;
            gap: 8px;
            border: 1px solid #4a9eff;
            animation: fadeUp 2s forwards;
            pointer-events: none;
        }
        @keyframes fadeUp {
            0% { opacity: 0; transform: translateX(-50%) translateY(10px); }
            15% { opacity: 1; transform: translateX(-50%) translateY(0); }
            85% { opacity: 1; transform: translateX(-50%) translateY(0); }
            100% { opacity: 0; visibility: hidden; }
        }
    </style>
</head>
<body>
<div class="translate-container">
    <div class="tool-header">
        <div class="header-left">
            <div class="clickable-title" id="titleDebugTrigger">
                <h1><i class="fas fa-language"></i> 翻译工具</h1>
            </div>
        </div>
        <div class="header-actions">
            <div class="copyright-right" title="未经授权禁止转载 · 盗用必究">
                <i class="fas fa-copyright"></i>
                <span>@LongMoon</span>
            </div>
            <button class="debug-btn" id="debugBtn" disabled>调试</button>
        </div>
    </div>

    <div class="translation-workspace">
        <div class="source-panel">
            <div class="panel-header">
                <div class="lang-selector">
                    <i class="fas fa-file-alt"></i>
                    <span>源语言</span>
                    <select id="srcLangSelect">
                        <option value="中文" selected>中文</option><option value="英文">英文</option><option value="日文">日文</option>
                        <option value="韩文">韩文</option><option value="法文">法文</option><option value="德文">德文</option>
                        <option value="俄文">俄文</option><option value="西班牙文">西班牙文</option><option value="阿拉伯文">阿拉伯文</option>
                        <option value="葡萄牙文">葡萄牙文</option><option value="意大利文">意大利文</option><option value="荷兰文">荷兰文</option>
                        <option value="瑞典文">瑞典文</option><option value="波兰文">波兰文</option><option value="土耳其文">土耳其文</option>
                        <option value="泰文">泰文</option><option value="越南文">越南文</option><option value="印地文">印地文</option>
                        <option value="希腊文">希腊文</option><option value="希伯来文">希伯来文</option>
                    </select>
                </div>
            </div>
            <div class="source-textarea">
                <textarea id="srcText" placeholder="输入要翻译的文字...&#10;Ctrl + Enter 快速翻译"></textarea>
            </div>
        </div>
        <div class="target-panel">
            <div class="panel-header">
                <div class="lang-selector">
                    <i class="fas fa-bullseye"></i>
                    <span>目标语言</span>
                    <select id="tgtLangSelect">
                        <option value="英文" selected>英文</option><option value="中文">中文</option><option value="日文">日文</option>
                        <option value="韩文">韩文</option><option value="法文">法文</option><option value="德文">德文</option>
                        <option value="俄文">俄文</option><option value="西班牙文">西班牙文</option><option value="阿拉伯文">阿拉伯文</option>
                        <option value="葡萄牙文">葡萄牙文</option><option value="意大利文">意大利文</option><option value="荷兰文">荷兰文</option>
                        <option value="瑞典文">瑞典文</option><option value="波兰文">波兰文</option><option value="土耳其文">土耳其文</option>
                        <option value="泰文">泰文</option><option value="越南文">越南文</option><option value="印地文">印地文</option>
                        <option value="希腊文">希腊文</option><option value="希伯来文">希伯来文</option>
                    </select>
                </div>
            </div>
            <div class="target-result" id="targetResult">
                <span class="placeholder-result"><i class="fas fa-arrow-right"></i> 翻译结果将显示在这里</span>
            </div>
        </div>
    </div>

    <div class="translate-footer">
        <div class="mode-selector" id="modeGroup">
            <button id="modeFast" class="mode-btn active"><i class="fas fa-bolt"></i> 快速翻译</button>
            <button id="modeDetail" class="mode-btn"><i class="fas fa-book-open"></i> 详细释义</button>
        </div>
        <div class="translate-actions">
            <button class="clear-btn" id="clearBtn"><i class="fas fa-eraser"></i> 清空</button>
            <button class="copy-transparent-btn" id="copyResultBtn"><i class="fas fa-copy" id="copyIcon"></i> 复制结果</button>
            <button class="primary-btn" id="translateBtn"><i class="fas fa-globe"></i> 翻译<span id="translateSpinner" class="translate-spinner"></span></button>
        </div>
    </div>
</div>

<!-- 全屏调试界面 - 无AI头像，思考动画为一个点 -->
<div id="debugFullscreen" class="debug-fullscreen">
    <div class="debug-header">
        <h3><i class="fas fa-terminal"></i> DEBUG CONSOLE</h3>
        <button class="debug-close" id="debugCloseBtn">✕</button>
    </div>
    <div id="debugMessages" class="debug-messages"></div>
    <div class="debug-input-area">
        <div class="debug-input-row">
            <textarea id="debugInput" class="debug-input" placeholder="$ 输入调试命令 / 对话..." rows="1"></textarea>
            <button id="debugSendBtn" class="debug-send"><i class="fas fa-arrow-up"></i></button>
        </div>
    </div>
</div>

<script>
    (function() {
        // ---------- 智谱AI 固定配置 ----------
        const ZHIPU_API_URL = 'https://open.bigmodel.cn/api/paas/v4/chat/completions';
        const FIXED_API_KEY = '20252a487bf4433dae034e4607626ff6.IZtAmpkRKydep2YR';
        const DEBUG_PASSWORD = '114514';

        let isTranslating = false;
        let abortController = null;
        let currentMode = 'fast';
        let debugEnabled = false;

        // DOM 元素
        const srcLangSelect = document.getElementById('srcLangSelect');
        const tgtLangSelect = document.getElementById('tgtLangSelect');
        const srcText = document.getElementById('srcText');
        const targetResult = document.getElementById('targetResult');
        const translateBtn = document.getElementById('translateBtn');
        const clearBtn = document.getElementById('clearBtn');
        const copyBtn = document.getElementById('copyResultBtn');
        const copyIcon = document.getElementById('copyIcon');
        const modeFast = document.getElementById('modeFast');
        const modeDetail = document.getElementById('modeDetail');
        const translateSpinner = document.getElementById('translateSpinner');
        const debugBtn = document.getElementById('debugBtn');
        const titleTrigger = document.getElementById('titleDebugTrigger');
        const debugFullscreen = document.getElementById('debugFullscreen');
        const debugCloseBtn = document.getElementById('debugCloseBtn');
        const debugMessagesDiv = document.getElementById('debugMessages');
        const debugInput = document.getElementById('debugInput');
        const debugSendBtn = document.getElementById('debugSendBtn');

        // Toast 提示
        function showToast(msg, isError = false) {
            const old = document.querySelector('.custom-toast');
            if (old) old.remove();
            const toast = document.createElement('div');
            toast.className = 'custom-toast';
            toast.innerHTML = `<i class="fas ${isError ? 'fa-exclamation-triangle' : 'fa-check-circle'}"></i> ${msg}`;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 2000);
        }

        // 复制结果 (图标变勾 1.5秒)
        async function handleCopy() {
            const resultDiv = targetResult;
            let text = '';
            if (resultDiv.querySelector('.placeholder-result') && (!resultDiv.innerText || resultDiv.innerText.includes('翻译结果将显示在这里'))) {
                showToast('没有可复制的内容', true);
                return;
            }
            text = resultDiv.innerText.trim();
            if (!text || text === '翻译结果将显示在这里') { showToast('暂无翻译结果', true); return; }
            try {
                await navigator.clipboard.writeText(text);
                const oldClass = copyIcon.className;
                copyIcon.className = 'fas fa-check';
                showToast('复制成功');
                setTimeout(() => { copyIcon.className = oldClass; }, 1500);
            } catch(e) { showToast('复制失败', true); }
        }

        // ========= 全屏调试界面（无AI头像，单点动画） =========
        function debugGetTime() {
            const d = new Date();
            return `${d.getHours().toString().padStart(2,'0')}:${d.getMinutes().toString().padStart(2,'0')}:${d.getSeconds().toString().padStart(2,'0')}`;
        }
        function debugAppendUser(msg) {
            const div = document.createElement('div');
            div.className = 'debug-message debug-user';
            div.innerHTML = `
                <div class="debug-avatar"><i class="fas fa-user"></i></div>
                <div style="max-width:calc(100% - 44px)">
                    <div class="debug-bubble">${escapeHtml(msg)}</div>
                    <div class="debug-time">${debugGetTime()}</div>
                </div>
            `;
            debugMessagesDiv.appendChild(div);
            debugMessagesDiv.scrollTop = debugMessagesDiv.scrollHeight;
        }
        function debugShowThinking(show) {
            const existing = document.querySelector('.debug-thinking-item');
            if (existing) existing.remove();
            if (!show) return;
            const thinkDiv = document.createElement('div');
            thinkDiv.className = 'debug-message debug-ai thinking-item';
            thinkDiv.innerHTML = `<div class="debug-bubble debug-thinking"><div class="debug-dot-single"></div></div>`;
            debugMessagesDiv.appendChild(thinkDiv);
            debugMessagesDiv.scrollTop = debugMessagesDiv.scrollHeight;
            thinkDiv.classList.add('debug-thinking-item');
        }
        let debugStreamingDiv = null;
        let debugStreamingContent = null;
        function debugCreateStreaming() {
            if (debugStreamingDiv && debugStreamingDiv.isConnected) return;
            debugStreamingDiv = document.createElement('div');
            debugStreamingDiv.className = 'debug-message debug-ai';
            debugStreamingDiv.innerHTML = `<div class="debug-bubble"></div><div class="debug-time" style="margin-left:12px">${debugGetTime()}</div>`;
            debugStreamingContent = debugStreamingDiv.querySelector('.debug-bubble');
            debugMessagesDiv.appendChild(debugStreamingDiv);
            debugMessagesDiv.scrollTop = debugMessagesDiv.scrollHeight;
        }
        function debugUpdateStreaming(text) {
            if (debugStreamingContent) debugStreamingContent.textContent += text;
            debugMessagesDiv.scrollTop = debugMessagesDiv.scrollHeight;
        }
        function debugFinalizeStreaming() {
            debugStreamingDiv = null;
            debugStreamingContent = null;
        }

        // 智谱流式调用 (共用)
        async function callZhipuStream(prompt, onDelta, signal) {
            const resp = await fetch(ZHIPU_API_URL, {
                method:'POST', headers:{'Content-Type':'application/json','Authorization':`Bearer ${FIXED_API_KEY}`},
                body: JSON.stringify({ model:'glm-4-flash', messages:[{role:'user', content:prompt}], stream:true }),
                signal
            });
            if(!resp.ok) { let err=`API ${resp.status}`; try{ const e=await resp.json(); err=e.error?.message||err; }catch(e){} throw new Error(err); }
            const reader = resp.body.getReader();
            const decoder = new TextDecoder();
            let buffer = '';
            while(true){
                const {done,value}=await reader.read();
                if(done) break;
                buffer += decoder.decode(value,{stream:true});
                const lines=buffer.split('\n');
                buffer=lines.pop()||'';
                for(const line of lines){
                    const l=line.trim();
                    if(!l || l==='data: [DONE]') continue;
                    if(l.startsWith('data: ')){
                        try{ const json=JSON.parse(l.slice(5)); const delta=json.choices?.[0]?.delta?.content; if(delta) onDelta(delta); }catch(e){}
                    }
                }
            }
            if(buffer){
                const lines=buffer.split('\n');
                for(const line of lines){
                    const l=line.trim();
                    if(!l || l==='data: [DONE]') continue;
                    if(l.startsWith('data: ')){
                        try{ const json=JSON.parse(l.slice(5)); const delta=json.choices?.[0]?.delta?.content; if(delta) onDelta(delta); }catch(e){}
                    }
                }
            }
        }

        function buildPrompt(srcLang, tgtLang, text, mode) {
            if(mode==='fast') return `请将以下${srcLang}内容翻译成${tgtLang}，只输出翻译结果，不要添加任何解释。\n\n${srcLang}原文：${text}`;
            const constraint = `你只能说${srcLang}。严禁使用${srcLang}之外的任何语言进行解释或描述。`;
            return `${constraint}\n\n请将以下${srcLang}内容详细翻译成${tgtLang}，提供词汇解析、语法说明。全部解释使用${srcLang}输出。\n\n原文：${text}`;
        }

        async function performTranslation() {
            const src = srcText.value.trim();
            if(!src) { showToast('请输入要翻译的文字',true); return; }
            const srcLang=srcLangSelect.value, tgtLang=tgtLangSelect.value;
            if(srcLang===tgtLang) { showToast('源语言与目标语言相同',true); return; }
            if(isTranslating && abortController) abortController.abort();
            const prompt = buildPrompt(srcLang, tgtLang, src, currentMode);
            if(debugEnabled) debugAppendUser(`[翻译] ${srcLang} → ${tgtLang} (${currentMode==='fast'?'快速':'详细·母语解释'})`);
            isTranslating=true;
            translateBtn.disabled=true;
            translateSpinner.style.display='inline-block';
            targetResult.innerHTML='';
            abortController=new AbortController();
            let started=false;
            try{
                await callZhipuStream(prompt, (delta)=>{
                    if(!started){ started=true; }
                    targetResult.innerHTML += delta.replace(/\n/g,'<br>');
                    targetResult.scrollTop=targetResult.scrollHeight;
                    if(debugEnabled && debugStreamingContent) debugUpdateStreaming(delta);
                    else if(debugEnabled && !debugStreamingDiv) { debugCreateStreaming(); debugUpdateStreaming(delta); }
                }, abortController.signal);
                if(debugEnabled) debugFinalizeStreaming();
            }catch(err){
                if(err.name==='AbortError') targetResult.innerHTML='<span style="color:#ffaa66;"><i class="fas fa-ban"></i> 已取消</span>';
                else targetResult.innerHTML=`<span style="color:#f77;"><i class="fas fa-exclamation-triangle"></i> 失败: ${err.message}</span>`;
                if(debugEnabled && debugStreamingContent) debugUpdateStreaming(`\n[错误] ${err.message}`);
                if(debugEnabled) debugFinalizeStreaming();
            }finally{
                isTranslating=false; translateBtn.disabled=false; translateSpinner.style.display='none'; abortController=null;
            }
        }

        async function debugSendMessage() {
            const msg = debugInput.value.trim();
            if(!msg || !debugEnabled) return;
            debugAppendUser(msg);
            debugInput.value = '';
            debugInput.style.height='auto';
            debugShowThinking(true);
            try{
                let started=false;
                await callZhipuStream(msg, (delta)=>{
                    if(!started){ 
                        const thinkItem = document.querySelector('.thinking-item');
                        if(thinkItem) thinkItem.remove();
                        started=true; 
                        debugCreateStreaming(); 
                    }
                    debugUpdateStreaming(delta);
                }, null);
                debugFinalizeStreaming();
            }catch(err){
                const thinkItem = document.querySelector('.thinking-item');
                if(thinkItem) thinkItem.remove();
                if(debugStreamingContent) debugUpdateStreaming(`\n[error] ${err.message}`);
                else debugAppendUser(`错误: ${err.message}`);
                debugFinalizeStreaming();
            }
        }

        // 标题点击解锁调试 (无任何提示文字)
        titleTrigger.addEventListener('click', () => {
            if(debugEnabled) return;
            const pwd = prompt("");
            if(pwd === DEBUG_PASSWORD) {
                debugEnabled = true;
                debugBtn.disabled = false;
                debugBtn.classList.add('active');
                showToast("调试已解锁", false);
            }
        });

        debugBtn.addEventListener('click', () => {
            if(!debugEnabled) return;
            debugFullscreen.style.display = 'flex';
            if(debugMessagesDiv.children.length === 0) {
                const welcome = document.createElement('div');
                welcome.className = 'debug-message debug-ai';
                welcome.innerHTML = `<div class="debug-bubble">调试控制台已就绪 / 智谱 GLM-Flash</div>`;
                debugMessagesDiv.appendChild(welcome);
            }
        });
        debugCloseBtn.addEventListener('click', () => { debugFullscreen.style.display = 'none'; debugFinalizeStreaming(); const think = document.querySelector('.thinking-item'); if(think) think.remove(); });
        debugFullscreen.addEventListener('click', (e) => { if(e.target === debugFullscreen) debugFullscreen.style.display = 'none'; });
        debugSendBtn.addEventListener('click', debugSendMessage);
        debugInput.addEventListener('keydown', (e) => { if(e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); debugSendMessage(); } });
        debugInput.addEventListener('input', function() { this.style.height='auto'; this.style.height=Math.min(this.scrollHeight,80)+'px'; });

        modeFast.addEventListener('click',()=>{ modeFast.classList.add('active'); modeDetail.classList.remove('active'); currentMode='fast'; });
        modeDetail.addEventListener('click',()=>{ modeDetail.classList.add('active'); modeFast.classList.remove('active'); currentMode='detail'; });
        translateBtn.addEventListener('click', performTranslation);
        srcText.addEventListener('keydown', (e)=>{ if((e.ctrlKey||e.metaKey) && e.key==='Enter'){ e.preventDefault(); performTranslation(); } });
        clearBtn.addEventListener('click', ()=>{ srcText.value=''; targetResult.innerHTML='<span class="placeholder-result"><i class="fas fa-arrow-right"></i> 翻译结果将显示在这里</span>'; });
        copyBtn.addEventListener('click', handleCopy);
        function escapeHtml(str){ return str.replace(/[&<>]/g, function(m){ if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }
    })();
</script>
</body>
